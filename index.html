<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" href="./favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="./favicon.png">
    <link rel="manifest" href="./manifest.webmanifest">
    <title>Słodcy Krytycy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pink: #ff6b9d;
            --pink-soft: #ff9ebb;
            --pink-glow: rgba(255, 107, 157, 0.25);
            --purple: #c44dff;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #22223a;
            --bg-input: #16162b;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a8;
            --text-muted: #55556a;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
            --radius-sm: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== APP SHELL ========== */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: linear-gradient(180deg, var(--bg-dark) 60%, transparent);
            z-index: 10;
        }

        .top-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px var(--pink-glow));
        }

        .top-bar h1 {
            font-size: 1.3em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ========== TAB BAR ========== */
        .tab-bar {
            padding: 0 16px 12px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            padding: 10px 10px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.92em;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .tab-btn:active {
            transform: scale(0.98);
        }

        .tab-btn.active {
            border-color: rgba(255, 255, 255, 0.14);
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.22), rgba(196, 77, 255, 0.22));
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.12);
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .sync-badge.connected {
            background: rgba(76, 217, 100, 0.12);
            color: #4cd964;
        }

        .sync-badge.disconnected {
            background: rgba(255, 69, 58, 0.12);
            color: #ff453a;
        }

        .sync-badge.connecting {
            background: rgba(255, 204, 0, 0.12);
            color: #ffcc00;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .sync-badge.connected .sync-dot {
            animation: none;
            opacity: 1;
        }

        /* ========== SCROLLABLE REVIEWS LIST ========== */
        .reviews-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 16px 100px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .reviews-scroll::-webkit-scrollbar {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .section-label {
            font-size: 0.75em;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .emoji {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.6;
        }

        .more-reviews-prompt {
            margin-top: 18px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            padding: 22px 20px 26px;
            text-align: center;
        }

        /* ========== REVIEW CARDS ========== */
        .review-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid var(--border);
            transition: transform 0.25s ease, opacity 0.25s ease, background 0.2s ease;
            overflow: hidden;
        }

        .review-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--pink), var(--purple));
            border-radius: 4px 0 0 4px;
        }

        .review-card:active {
            transform: scale(0.98);
            background: var(--bg-card-hover);
        }

        .review-card.removing {
            opacity: 0;
            transform: translateX(-100%);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-header h3 {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text-primary);
            padding-right: 10px;
            line-height: 1.3;
        }

        .delete-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 69, 58, 0.1);
            color: #ff453a;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .delete-btn:active {
            background: rgba(255, 69, 58, 0.25);
            transform: scale(0.9);
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .edit-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(76, 217, 100, 0.1);
            color: #4cd964;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .edit-btn:active {
            background: rgba(76, 217, 100, 0.25);
            transform: scale(0.9);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-date {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-flavor {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 107, 157, 0.08);
            color: var(--pink-soft);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.78em;
            font-weight: 600;
        }

        .card-comment {
            color: var(--text-secondary);
            font-size: 0.88em;
            line-height: 1.5;
            margin-top: 8px;
            font-style: italic;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 800;
            color: white;
        }

        .rating-badge.high {
            background: linear-gradient(135deg, #4cd964, #34c759);
            box-shadow: 0 4px 12px rgba(76, 217, 100, 0.3);
        }

        .rating-badge.medium {
            background: linear-gradient(135deg, #ffcc00, #ff9500);
            box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);
        }

        .rating-badge.low {
            background: linear-gradient(135deg, #ff6b6b, #ff453a);
            box-shadow: 0 4px 12px rgba(255, 69, 58, 0.3);
        }

        .rating-label {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .rating-stars {
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        /* ========== RANKING ========== */
        .ranking-wrap {
            padding-bottom: 10px;
        }

        .ranking-block {
            margin-bottom: 12px;
        }

        .ranking-title {
            font-size: 0.95em;
            font-weight: 900;
            margin: 6px 0 10px;
            letter-spacing: 0.2px;
        }

        /* ========== MAPA WOJEWÓDZTW (Ranking) ========== */
        .where-map {
            margin: 8px 0 6px;
        }

        .map-status {
            text-align: center;
            font-size: 0.8em;
            color: var(--text-muted);
            font-weight: 700;
            margin: 6px 0 10px;
        }

        .map-selected {
            text-align: center;
            font-size: 0.82em;
            color: var(--text-primary);
            font-weight: 800;
            margin: -4px 0 8px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-container {
            width: 100%;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #poland-map {
            width: 100%;
            height: 240px;
            display: block;
        }

        #poland-map .mapsvg-region {
            fill: transparent !important;
            stroke: rgba(255, 255, 255, 0.16);
            stroke-width: 2;
            vector-effect: non-scaling-stroke;
            cursor: pointer;
            transition: stroke 0.15s ease, filter 0.15s ease;
        }

        #poland-map .mapsvg-region:hover {
            stroke: rgba(255, 107, 157, 0.7);
            filter: drop-shadow(0 0 10px rgba(255, 107, 157, 0.18));
        }

        #poland-map .mapsvg-region.active-voiv {
            stroke: rgba(255, 107, 157, 0.95);
            filter: drop-shadow(0 0 14px rgba(255, 107, 157, 0.22));
        }

        #map-markers .map-marker {
            fill: rgba(255, 107, 157, 0.95);
            stroke: rgba(255, 255, 255, 0.18);
            stroke-width: 1;
        }

        .podium {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            padding: 0 2px;
            align-items: end;
            position: relative;
            padding-bottom: 12px;
            width: 100%;
        }

        /* Usunięte: pseudoelement pod podium powodował "losową kreskę" na dole. */

        .podium-item {
            text-align: center;
            padding: 14px 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            transition: transform 0.25s ease, background 0.2s ease, box-shadow 0.25s ease;
            min-height: 102px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            min-width: 0;
        }

        .podium-item.rank-1 {
            transform: translateY(-14px);
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.30), rgba(196, 77, 255, 0.22));
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 18px 38px rgba(196, 77, 255, 0.13);
            min-height: 132px;
        }

        .podium-item.rank-2 {
            background: linear-gradient(135deg, rgba(255, 204, 0, 0.16), rgba(255, 149, 0, 0.10));
            min-height: 112px;
        }

        .podium-item.rank-3 {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.14), rgba(255, 69, 58, 0.10));
            min-height: 112px;
        }

        .podium-emblem {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 2px 0 8px;
        }

        .podium-laurel {
            font-size: 1.2em;
            filter: drop-shadow(0 6px 18px rgba(255, 204, 0, 0.12));
            transform: translateY(-2px);
            color: #ffcc00;
        }

        .podium-number {
            font-size: 2.1em;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            margin: 0 0 6px;
        }

        .podium-item.rank-1 .podium-number {
            background: linear-gradient(135deg, #ffe26b, #ffb703);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 24px rgba(255, 204, 0, 0.12));
        }

        .podium-item.rank-2 .podium-number {
            background: linear-gradient(135deg, #f6f7fb, #bdbdbd);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .podium-item.rank-3 .podium-number {
            background: linear-gradient(135deg, #ffd3c2, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .podium-shop {
            font-size: 0.95em;
            font-weight: 900;
            line-height: 1.2;
            margin-top: 6px;
            padding: 0 8px;
            width: 100%;
            overflow: visible;
            text-overflow: clip;
            white-space: normal;
            min-width: 0;
            word-break: break-word;
        }

        .podium-item .rating-badge {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            font-size: 1em;
            margin: 4px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== FAB (Floating Action Button) ========== */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 50%;
            transform: translateX(50%);
            max-width: 480px;
            width: calc(100% - 32px);
            z-index: 50;
            display: flex;
            justify-content: flex-end;
            pointer-events: none;
        }

        .fab-btn {
            pointer-events: auto;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.35);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            padding: 0;
            margin: 0;
        }

        .fab-btn:active {
            transform: scale(0.9);
        }

        .fab-btn.active {
            transform: rotate(45deg);
            border-radius: 50%;
        }

        .fab.hidden {
            display: none;
        }

        /* ========== BOTTOM SHEET ========== */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sheet-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.open {
            transform: translate(-50%, 0);
        }

        .sheet-handle-area {
            padding: 12px 0 4px;
            display: flex;
            justify-content: center;
            cursor: grab;
            flex-shrink: 0;
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
        }

        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px 16px;
            flex-shrink: 0;
        }

        .sheet-header h2 {
            font-size: 1.15em;
            font-weight: 700;
        }

        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            padding: 0;
            margin: 0;
        }

        .sheet-close:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .sheet-body {
            padding: 0 20px 20px;
            overflow-y: auto;
            flex: 1;
        }

        /* ========== FORM ========== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.78em;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 0 3px var(--pink-glow);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group textarea {
            resize: none;
            min-height: 80px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white;
            font-size: 1.05em;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ========== CONFIRM DIALOG ========== */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }

        .confirm-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .confirm-dialog {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border);
        }

        .confirm-overlay.visible .confirm-dialog {
            transform: scale(1);
        }

        .confirm-dialog .emoji-big {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .confirm-dialog p {
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-actions button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 0.95em;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .btn-cancel:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-delete {
            background: #ff453a;
            color: white;
        }

        .btn-delete:active {
            opacity: 0.8;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;

<body>

    <div class="app">
        <!-- Top Bar -->

                <span class="sync-dot"></span>

        <!-- Tabs -->
        <div class="tab-bar" id="tab-bar">
            <button class="tab-btn active" data-tab="icecream" type="button">Lody</button>
            <button class="tab-btn" data-tab="restaurants" type="button">Restauracje</button>

    <!-- FAB -->

        <button class="fab-btn" id="fab-btn" aria-label="Dodaj ocenę">+</button>
    </div>

    <!-- Bottom Sheet Overlay -->

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-handle-area"><div class="sheet-handle"></div></div>
        <div class="sheet-header">
            <h2 id="sheet-title">Nowa ocena 🍧</h2>
            <button class="sheet-close" id="sheet-close" aria-label="Zamknij">✕</button>
        </div>
        <div class="sheet-body">
            <form id="review-form">
                <div class="form-group">
                    <label for="shop-name" id="place-label">Lodziarnia / Miejsce</label>

    <!-- Toast -->

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCUdQqKQ-wOeI-iVDZ4lzA5eVVJ8X98ZXQ",
            authDomain: "lodowka-9ca68.firebaseapp.com",
            databaseURL: "https://lodowka-9ca68-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lodowka-9ca68",
            storageBucket: "lodowka-9ca68.firebasestorage.app",
            messagingSenderId: "453003799938",
            appId: "1:453003799938:web:b5f64cccf6e36dae51b39b",
            measurementId: "G-XCB7SDNDDT"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const reviewsRef = db.ref('reviews');
        const APP_VERSION = '2026-03-18-edit-delete-fix-1';

        // ==================== DOM ====================
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('review-form');
            const reviewsContainer = document.getElementById('reviews-container');
            const syncBadge = document.getElementById('sync-badge');
            const syncText = document.getElementById('sync-text');
            const fabBtn = document.getElementById('fab-btn');
            const sheetOverlay = document.getElementById('sheet-overlay');
            const bottomSheet = document.getElementById('bottom-sheet');
            const sheetClose = document.getElementById('sheet-close');
            const sheetTitle = document.getElementById('sheet-title');
            const confirmOverlay = document.getElementById('confirm-overlay');
            const confirmCancel = document.getElementById('confirm-cancel');
            const confirmDelete = document.getElementById('confirm-delete');
            const toastEl = document.getElementById('toast');
            const icecreamCelebration = document.getElementById('icecream-celebration');
            const restaurantCelebration = document.getElementById('restaurant-celebration');

            const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
            const fabWrapper = document.getElementById('fab-wrapper');
            const sectionLabel = document.getElementById('section-label');
            const placeLabel = document.getElementById('place-label');
            const shopInput = document.getElementById('shop-name');
            const itemLabelEl = document.getElementById('item-label');
            const itemInput = document.getElementById('item-name');
            const submitBtn = document.getElementById('submit-btn');

            let pendingDeleteId = null;
            let editingReviewId = null;
            let editingCategory = 'icecream'; // 'icecream' | 'restaurant'
            let activeTab = 'icecream'; // 'icecream' | 'restaurants' | 'ranking'
            let latestReviewsData = null;


            // ==================== CONNECTION STATUS ====================
            db.ref('.info/connected').on('value', snap => {
                if (snap.val() === true) {
                    syncBadge.className = 'sync-badge connected';
                    syncText.textContent = 'Połączono';
                } else {
                    syncBadge.className = 'sync-badge disconnected';
                    syncText.textContent = 'Offline';
                }
            });

            // Helpful debug info to ensure both devices run same build + DB
            console.log('[LodowiKrytycy] version=', APP_VERSION);
            console.log('[LodowiKrytycy] href=', window.location.href);
            console.log('[LodowiKrytycy] databaseURL=', firebaseConfig.databaseURL);

            // ==================== TOAST ====================
            function showToast(message, type = 'success') {
                toastEl.textContent = message;
                toastEl.className = `toast ${type}`;
                requestAnimationFrame(() => toastEl.classList.add('show'));
                setTimeout(() => toastEl.classList.remove('show'), 2500);
            }

            function playIcecreamCelebration() {
                if (!icecreamCelebration) return Promise.resolve();
                icecreamCelebration.classList.add('show');
                return new Promise((resolve) => {
                    setTimeout(() => {
                        icecreamCelebration.classList.remove('show');
                        resolve();
                    }, 1400);
                });
            }

            function playRestaurantCelebration() {
                if (!restaurantCelebration) return Promise.resolve();
                restaurantCelebration.classList.add('show');
                return new Promise((resolve) => {
                    setTimeout(() => {
                        restaurantCelebration.classList.remove('show');
                        resolve();
                    }, 1400);
                });
            }

            // ==================== FORM SYNC ====================
            function syncFormForCategory(category) {
                const isRestaurant = category === 'restaurant';
                placeLabel.textContent = isRestaurant ? 'Restauracja / Miejsce' : 'Lodziarnia / Miejsce';
                itemLabelEl.textContent = isRestaurant ? 'Jakie jedzenie' : 'Smak';
                itemInput.placeholder = isRestaurant ? 'np. Burger z wołowiny i frytki' : 'np. Słony karmel i mango';
                shopInput.placeholder = isRestaurant ? 'np. Restauracja u Jana' : 'np. Lody u Jana';
                submitBtn.textContent = isRestaurant ? 'Zapisz ocenę! 🍽️' : 'Zapisz ocenę! 🍧';
            }

            function getTabCategory(tab) {
                return tab === 'restaurants' ? 'restaurant' : 'icecream';
            }

            // ==================== TABS ====================
            function setActiveTab(tab) {
                activeTab = tab;

                tabButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tab);
                });

                const isRanking = tab === 'ranking';
                sectionLabel.classList.toggle('hidden', isRanking);
                fabWrapper.classList.toggle('hidden', isRanking);

                if (!isRanking) {
                    editingCategory = getTabCategory(tab);
                    syncFormForCategory(editingCategory);
                }

                render();
            }

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (bottomSheet.classList.contains('open')) closeSheet();
                    setActiveTab(btn.dataset.tab);
                });
            });

            // Set initial form defaults (icecream tab).
            syncFormForCategory(editingCategory);

            // ==================== BOTTOM SHEET ====================
            function openSheet() {
                sheetOverlay.classList.add('visible');
                bottomSheet.classList.add('open');
                fabBtn.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeSheet() {
                sheetOverlay.classList.remove('visible');
                bottomSheet.classList.remove('open');
                fabBtn.classList.remove('active');
                document.body.style.overflow = '';
                editingReviewId = null;
                editingCategory = activeTab === 'restaurants' ? 'restaurant' : 'icecream';
                syncFormForCategory(editingCategory);
                sheetTitle.textContent = editingCategory === 'restaurant' ? 'Nowa ocena 🍽️' : 'Nowa ocena 🍧';
            }

            fabBtn.addEventListener('click', () => {
                if (activeTab === 'ranking') {
                    setActiveTab('icecream');
                    return;
                }
                if (bottomSheet.classList.contains('open')) {
                    closeSheet();
                } else {
                    editingReviewId = null;
                    editingCategory = activeTab === 'restaurants' ? 'restaurant' : 'icecream';
                    syncFormForCategory(editingCategory);
                    sheetTitle.textContent = editingCategory === 'restaurant' ? 'Nowa ocena 🍽️' : 'Nowa ocena 🍧';
                    openSheet();
                }
            });

            sheetOverlay.addEventListener('click', closeSheet);
            sheetClose.addEventListener('click', closeSheet);

            // ==================== CONFIRM DIALOG ====================
            function showConfirm(reviewId) {
                pendingDeleteId = reviewId;
                confirmOverlay.classList.add('visible');
            }

            function hideConfirm() {
                confirmOverlay.classList.remove('visible');
                pendingDeleteId = null;
            }

            confirmCancel.addEventListener('click', hideConfirm);
            confirmOverlay.addEventListener('click', (e) => {
                if (e.target === confirmOverlay) hideConfirm();
            });

            confirmDelete.addEventListener('click', () => {
                if (!pendingDeleteId) return;
                const reviewId = pendingDeleteId; // keep value before hideConfirm() nulls it
                const card = document.querySelector(`[data-review-id="${reviewId}"]`);
                if (card) card.classList.add('removing');
                hideConfirm();
                setTimeout(() => {
                    reviewsRef.child(reviewId).remove()
                        .then(() => {
                            if (card) card.remove();
                            showToast('Ocena usunięta 🗑️');
                        })
                        .catch((err) => {
                            if (card) card.classList.remove('removing');
                            console.error('[LodowiKrytycy] delete failed', err);
                            showToast('Błąd usuwania!', 'error');
                        });
                }, 250);
            });

            window._deleteReview = showConfirm;

            window._editReview = (reviewId) => {
                reviewsRef.child(reviewId).once('value')
                    .then(snap => {
                        const review = snap.val();
                        if (!review) return;

                        const inferredCategory =
                            review.category === 'restaurant' ? 'restaurant' :
                            (review.category === 'icecream' ? 'icecream' :
                                (review.food ? 'restaurant' : 'icecream'));

                        editingReviewId = reviewId;
                        editingCategory = inferredCategory;

                        setActiveTab(inferredCategory === 'restaurant' ? 'restaurants' : 'icecream');
                        syncFormForCategory(editingCategory);
                        sheetTitle.textContent = 'Edytuj ocenę ✏️';

                        shopInput.value = review.shop || '';
                        itemInput.value = editingCategory === 'icecream'
                            ? (review.flavor ?? review.food ?? '')
                            : (review.food ?? review.flavor ?? '');

                        const ratings = getRatingsFromReview(review);
                        if (ratings) {
                            document.getElementById('rating-mine').value = String(ratings.mine);
                            document.getElementById('rating-other').value = String(ratings.other);
                        } else {
                            const fallback = toOneDecimal(review.rating) ?? 0;
                            document.getElementById('rating-mine').value = String(fallback);
                            document.getElementById('rating-other').value = String(fallback);
                        }

                        document.getElementById('comment').value = review.comment || '';
                        openSheet();
                    })
                    .catch(() => showToast('Nie udało się wczytać oceny', 'error'));
            };

            // ==================== HELPERS ====================
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getRatingClass(rating) {
                const num = parseFloat(rating);
                if (num >= 7) return 'high';
                if (num >= 4) return 'medium';
                return 'low';
            }

            function getStars(rating) {
                const num = parseFloat(rating);
                const full = Math.floor(num / 2);
                const half = (num % 2) >= 1 ? 1 : 0;
                return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
            }

            function toOneDecimal(num) {
                const n = Number(num);
                if (!Number.isFinite(n)) return null;
                return Number(n.toFixed(1));
            }

            function getRatingsFromReview(review) {
                // Backward compatibility with older entries that have only `rating`
                const mine = toOneDecimal(review.ratingMine ?? review.rating_mine ?? review.rating);
                const other = toOneDecimal(review.ratingOther ?? review.rating_other ?? review.rating);
                if (mine === null || other === null) return null;
                const avg = toOneDecimal((mine + other) / 2);
                return { mine, other, avg };
            }

            function getAvgRatingFromReview(review) {
                const explicitAvg = toOneDecimal(review.ratingAvg ?? review.rating_avg);
                if (explicitAvg !== null) return explicitAvg;
                const ratings = getRatingsFromReview(review);
                if (ratings) return ratings.avg;
                return toOneDecimal(review.rating);
            }

            // ==================== RENDER REVIEWS / RANKING ====================
            function getReviewCategory(review) {
                if (review.category === 'restaurant') return 'restaurant';
                if (review.category === 'icecream') return 'icecream';
                // Fallback for older/newer entries:
                // - restaurant records contain `food`
                // - older records had only `flavor` (icecream)
                return review.food ? 'restaurant' : 'icecream';
            }

            function getReviewItem(review, category) {
                if (category === 'restaurant') {
                    return review.food ?? review.flavor ?? '';
                }
                return review.flavor ?? review.food ?? '';
            }

            function getReviewTs(review) {
                return review.timestamp ?? review.updatedAt ?? 0;
            }

            function computeTopShops(reviewsArray, category, limit = 3) {
                const map = new Map(); // shop -> { sum, count, lastTs, bestRating, bestItem }

                for (const r of reviewsArray) {
                    if (getReviewCategory(r) !== category) continue;
                    if (!r.shop) continue;

                    const rating = getAvgRatingFromReview(r);
                    if (rating === null) continue;

                    const ts = getReviewTs(r);
                    const item = getReviewItem(r, category);

                    if (!map.has(r.shop)) {
                        map.set(r.shop, {
                            shop: r.shop,
                            sum: rating,
                            count: 1,
                            lastTs: ts,
                            bestRating: rating,
                            bestItem: item
                        });
                    } else {
                        const cur = map.get(r.shop);
                        cur.sum += rating;
                        cur.count += 1;
                        cur.lastTs = Math.max(cur.lastTs, ts);
                        if (rating > cur.bestRating) {
                            cur.bestRating = rating;
                            cur.bestItem = item;
                        }
                    }
                }

                return Array.from(map.values())
                    .map(v => ({
                        shop: v.shop,
                        avg: toOneDecimal(v.sum / v.count),
                        count: v.count,
                        lastTs: v.lastTs,
                        bestItem: v.bestItem
                    }))
                    .sort((a, b) =>
                        (b.avg ?? 0) - (a.avg ?? 0) ||
                        (b.count - a.count) ||
                        (b.lastTs - a.lastTs)
                    )
                    .slice(0, limit);
            }

            function renderPodium(items, category) {
                if (!items || items.length === 0) {
                    return `
                        <div class="empty-state" style="padding: 30px 20px 18px;">
                            <span class="emoji">🏆</span>
                            <p>Brak danych do rankingu.</p>
                        </div>
                    `;
                }

                // Winner in the middle: TOP2 | TOP1 | TOP3
                const slot0 = items[1] ? { item: items[1], rank: 2 } : null; // left
                const slot1 = items[0] ? { item: items[0], rank: 1 } : null; // middle
                const slot2 = items[2] ? { item: items[2], rank: 3 } : null; // right
                const slots = [slot0, slot1, slot2];

                return `
                    <div class="podium">
                        ${slots.map((slot) => {
                            if (!slot) return '<div class="podium-item" style="visibility:hidden"></div>';

                            const { item, rank } = slot;
                            const avg = item.avg ?? null;
                            const ratingClass = getRatingClass(avg ?? 0);
                            const ratingText = avg ?? '—';

                            return `
                                <div class="podium-item rank-${rank}">
                                    <div class="podium-number" aria-hidden="true">${rank}</div>
                                    <div class="rating-badge ${ratingClass}">${escapeHtml(String(ratingText))}</div>
                                    <div class="podium-shop">${escapeHtml(item.shop)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // ========== MAPA (Ranking) ==========
            let rankingMapRunId = 0;
            const MAX_SHOPS_FOR_MAP = 40;
            const GEO_CACHE_PREFIX = 'voiv_geo_cache_v1:';

            function normalizePlText(text) {
                return (text ?? '')
                    .toString()
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/\p{Diacritic}/gu, '')
                    .replace(/[^a-z0-9]+/g, ' ')
                    .trim();
            }

            function guessVoivodeshipIdFromText(text) {
                const s = normalizePlText(text);
                if (!s) return null;

                // Common city/village hints used in reviews.
                // This helps when geocoding is unavailable or blocked.
                if (s.includes('pruszkow') || s.includes('komorow') || s.includes('warszaw')) return 'PL-MZ';

                // Prioritize more specific patterns first.
                if (s.includes('zachodniopomorsk')) return 'PL-ZP';
                if (s.includes('dolnoslask')) return 'PL-DS';
                if (s.includes('kujawsko') && s.includes('pomorsk')) return 'PL-KP';
                if (s.includes('lodzk')) return 'PL-LD';
                if (s.includes('lubelsk')) return 'PL-LU';
                if (s.includes('lubusk')) return 'PL-LB';
                if (s.includes('malopolsk')) return 'PL-MA';
                if (s.includes('mazowieck')) return 'PL-MZ';
                if (s.includes('opolsk')) return 'PL-OP';
                if (s.includes('podkarpack')) return 'PL-PK';
                if (s.includes('podlask')) return 'PL-PD';
                if (s.includes('warminsko') && s.includes('mazurs')) return 'PL-WN';
                if (s.includes('wielkopol')) return 'PL-WP';
                if (s.includes('swietokrzys')) return 'PL-SK';
                if (s.includes('slask')) return 'PL-SL';
                if (s.includes('pomorsk')) return 'PL-PM';

                return null;
            }

            function guessVoivodeshipIdFromAddress(address) {
                if (!address) return null;
                const candidates = [
                    address.state,
                    address.region,
                    address.province,
                    address.county,
                    address.state_district,
                    address.city,
                    address.town,
                    address.village,
                    address.hamlet,
                ].filter(Boolean);

                for (const c of candidates) {
                    const voiv = guessVoivodeshipIdFromText(c);
                    if (voiv) return voiv;
                }
                return guessVoivodeshipIdFromText(candidates.join(' '));
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function geocodeShopToVoivodeship(shopText) {
                // Nominatim direct in-browser can be blocked by CORS; we handle that at call site.
                const query = `${shopText}, Polska`;
                const url =
                    `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=1&q=${encodeURIComponent(query)}`;

                const res = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!res.ok) return null;
                const data = await res.json();
                if (!Array.isArray(data) || !data[0]) return null;
                const first = data[0];
                const voivId = guessVoivodeshipIdFromAddress(first.address);
                if (!voivId) return null;

                const lat = Number(first.lat);
                const lon = Number(first.lon);
                return {
                    voivId,
                    lat: Number.isFinite(lat) ? lat : null,
                    lon: Number.isFinite(lon) ? lon : null
                };
            }

            function renderPolandMapSvg() {
                // SVG source: interactive Poland voivodeships with ids like PL-DS, PL-MA...
                // We override fill/stroke via our CSS, so the original inline fills won't matter.
                return `

            function initRankingMap(reviewsArray) {
                const statusEl = document.getElementById('map-status');
                const selectedEl = document.getElementById('map-selected');
                const svg = document.getElementById('poland-map');
                const markerG = document.getElementById('map-markers');
                if (!statusEl || !selectedEl || !svg || !markerG) return;

                rankingMapRunId += 1;
                const runId = rankingMapRunId;

                const baseViewBox = svg.getAttribute('viewBox') || '0 0 612.75696 577.23169';
                const GEO_BOUNDS = {
                    west: 14.122232,
                    east: 24.149724,
                    north: 54.834941,
                    south: 49.002699
                };

                const regionPaths = Array.from(svg.querySelectorAll('path[id^="PL-"]'));

                // Click to zoom.
                let activeVoivId = null;
                const setActive = (voivId) => {
                    regionPaths.forEach(p => p.classList.toggle('active-voiv', p.id === voivId));
                    const circles = markerG.querySelectorAll('circle.map-marker');
                    circles.forEach(c => {
                        if (!voivId) c.style.opacity = '1';
                        else c.style.opacity = (c.dataset.voivId === voivId) ? '1' : '0.25';
                    });

                    if (!voivId) {
                        selectedEl.textContent = 'Kliknij województwo';
                        return;
                    }

                    const activePath = regionPaths.find(p => p.id === voivId);
                    const label =
                        (activePath && (activePath.getAttribute('title') || activePath.parentElement?.getAttribute('title'))) ||
                        voivId;

                    // Some sources include extra suffixes; keep first part.
                    selectedEl.textContent = label.toString().split(' - ')[0].trim();
                };

                regionPaths.forEach((path) => {
                    path.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();

                        const voivId = path.id;
                        if (activeVoivId === voivId) {
                            activeVoivId = null;
                            svg.setAttribute('viewBox', baseViewBox);
                            setActive(null);
                            return;
                        }

                        activeVoivId = voivId;
                        svg.setAttribute('viewBox', baseViewBox);
                        const bbox = path.getBBox();
                        const pad = 18;
                        const vb = `${bbox.x - pad} ${bbox.y - pad} ${bbox.width + pad * 2} ${bbox.height + pad * 2}`;
                        svg.setAttribute('viewBox', vb);
                        setActive(voivId);
                    });
                });

                svg.addEventListener('click', (e) => {
                    if (e.target === svg) {
                        activeVoivId = null;
                        svg.setAttribute('viewBox', baseViewBox);
                        setActive(null);
                    }
                });

                markerG.innerHTML = '';
                setActive(null);
                statusEl.textContent = 'Geokodowanie miejsc...';
                selectedEl.textContent = 'Kliknij województwo';

                const shops = Array.from(new Set((reviewsArray || [])
                    .map(r => (r.shop || '').trim())
                    .filter(Boolean)));
                const limitedShops = shops.slice(0, MAX_SHOPS_FOR_MAP);

                if (limitedShops.length === 0) {
                    statusEl.textContent = 'Brak danych do mapy.';
                    return;
                }

                const voivToEntries = new Map(); // voiv -> [{ shopName, lat, lon }]
                let geocodeBlocked = false;

                (async () => {
                    const total = limitedShops.length;
                    let done = 0;

                    for (const shopText of limitedShops) {
                        if (runId !== rankingMapRunId) return;
                        done += 1;

                        const inferred = guessVoivodeshipIdFromText(shopText);
                        if (inferred) {
                            if (!voivToEntries.has(inferred)) voivToEntries.set(inferred, []);
                            voivToEntries.get(inferred).push({ shopName: shopText, lat: null, lon: null });
                            statusEl.textContent = `Geokodowanie miejsc (${done}/${total})...`;
                            continue;
                        }

                        if (geocodeBlocked) {
                            statusEl.textContent = `Geokodowanie miejsc (${done}/${total})...`;
                            continue;
                        }

                        const cacheKey = GEO_CACHE_PREFIX + normalizePlText(shopText);
                        let geo = null;
                        try {
                            const raw = localStorage.getItem(cacheKey);
                            if (raw) {
                                if (raw.startsWith('{')) {
                                    geo = JSON.parse(raw);
                                } else {
                                    // Backward compatibility: old cache stored only voivId string.
                                    geo = { voivId: raw, lat: null, lon: null };
                                }
                            }
                        } catch { /* ignore */ }

                        if (geo === null) {
                            try {
                                geo = await geocodeShopToVoivodeship(shopText);
                            } catch (err) {
                                // Usually CORS or network errors. We stop doing more requests.
                                geocodeBlocked = true;
                                console.warn('[LodowiKrytycy] geocode blocked', err);
                                statusEl.textContent = 'Geokodowanie zablokowane (CORS). Mapa bez znaczników.';
                                geo = null;
                                continue;
                            }

                            try {
                                localStorage.setItem(cacheKey, geo ? JSON.stringify(geo) : '');
                            } catch { /* ignore */ }
                        }

                        if (geo?.voivId) {
                            if (!voivToEntries.has(geo.voivId)) voivToEntries.set(geo.voivId, []);
                            voivToEntries.get(geo.voivId).push({
                                shopName: shopText,
                                lat: geo.lat ?? null,
                                lon: geo.lon ?? null
                            });
                        }

                        statusEl.textContent = `Geokodowanie miejsc (${done}/${total})...`;
                        await sleep(650);
                    }

                    // Draw markers.
                    markerG.innerHTML = '';
                    const entries = Array.from(voivToEntries.entries());
                    for (const [voivId, shopList] of entries) {
                        const path = svg.querySelector(`#${voivId}`);
                        if (!path) continue;

                        const bbox = path.getBBox();
                        const cx = bbox.x + bbox.width / 2;
                        const cy = bbox.y + bbox.height / 2;

                        const count = Math.min(shopList.length, 10);
                        for (let i = 0; i < count; i++) {
                            const entry = shopList[i];
                            let x = cx;
                            let y = cy;

                            if (Number.isFinite(entry.lat) && Number.isFinite(entry.lon)) {
                                // Approximate geo->SVG projection using source geo bounds.
                                const lonRatio = (entry.lon - GEO_BOUNDS.west) / (GEO_BOUNDS.east - GEO_BOUNDS.west);
                                const latRatio = (GEO_BOUNDS.north - entry.lat) / (GEO_BOUNDS.north - GEO_BOUNDS.south);
                                x = lonRatio * 612.75696;
                                y = latRatio * 577.23169;
                            }

                            // Small jitter so points in same area are visible.
                            const angle = i * 1.7;
                            const dist = 2 + i * 2.2;
                            x += Math.cos(angle) * dist;
                            y += Math.sin(angle) * dist;

                            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            circle.setAttribute('cx', String(x));
                            circle.setAttribute('cy', String(y));
                            circle.setAttribute('r', '4');
                            circle.setAttribute('class', 'map-marker');
                            circle.dataset.voivId = voivId;
                            circle.dataset.shopName = entry.shopName || shopList[0]?.shopName || 'Nieznane miejsce';
                            circle.setAttribute('title', circle.dataset.shopName);
                            circle.addEventListener('click', (ev) => {
                                ev.stopPropagation();
                                const name = circle.dataset.shopName || 'Nieznane miejsce';
                                selectedEl.textContent = name;
                            });
                            markerG.appendChild(circle);
                        }
                    }

                    if (voivToEntries.size) {
                        statusEl.textContent = 'Kliknij województwo, żeby przybliżyć.';
                    } else {
                        statusEl.textContent = 'Brak danych do mapy.';
                    }

                    setActive(activeVoivId);
                })();
            }

            function renderRanking(reviewsArray) {
                const topRestaurants = computeTopShops(reviewsArray, 'restaurant', 3);
                const topIcecream = computeTopShops(reviewsArray, 'icecream', 3);

                reviewsContainer.innerHTML = `
                    <div class="ranking-wrap">
                        <div class="ranking-block">
                            <div class="ranking-title">Gdzie jedliśmy?</div>
                            <div class="where-map">
                                <div id="map-status" class="map-status">Ładowanie mapy...</div>
                                <div id="map-selected" class="map-selected">Kliknij województwo</div>
                                <div class="map-container">
                                    ${renderPolandMapSvg()}
                                </div>
                            </div>
                        </div>

                        <div class="ranking-block">
                            <div class="ranking-title">Restauracje TOP 3</div>
                            ${renderPodium(topRestaurants, 'restaurant')}
                        </div>
                        <div class="ranking-block">
                            <div class="ranking-title">Lodziarnie TOP 3</div>
                            ${renderPodium(topIcecream, 'icecream')}
                        </div>
                    </div>
                `;

                initRankingMap(reviewsArray);
            }

            function renderEmptyState(category) {
                if (category === 'restaurant') {
                    return `
                        <div class="empty-state">
                            <span class="emoji">🍽️</span>
                            <p>Jeszcze nie oceniliście żadnych restauracji.<br>Kliknij <strong>+</strong> i dodajcie pierwszą ocenę!</p>
                        </div>
                    `;
                }

                return `
                    <div class="empty-state">
                        <span class="emoji">🍨</span>
                        <p>Jeszcze nie oceniliście żadnych lodów.<br>Kliknij <strong>+</strong> i dodajcie pierwszą ocenę!</p>
                    </div>
                `;
            }

            function renderMoreReviewsPrompt(category) {
                const isRestaurant = category === 'restaurant';
                const emoji = isRestaurant ? '🫣' : '🫣';
                const title = isRestaurant ? 'Dodajcie więcej ocen restauracji.' : 'Dodajcie więcej ocen lodów.';
                const cta = 'Kliknij <strong>+</strong> i dodajcie kolejną!';

                // Uses the same float animation via the shared `.empty-state .emoji` rule.
                return `
                    <div class="empty-state more-reviews-prompt">
                        <span class="emoji">${emoji}</span>
                        <p>${title}<br>${cta}</p>
                    </div>
                `;
            }

            function renderReviews(reviewsArray, category) {
                const filtered = reviewsArray.filter(r => getReviewCategory(r) === category);

                if (filtered.length === 0) {
                    reviewsContainer.innerHTML = renderEmptyState(category);
                    return;
                }

                reviewsContainer.innerHTML = '';

                const itemIcon = category === 'restaurant' ? '🍽️' : '🍦';

                filtered.forEach(review => {
                    const card = document.createElement('div');
                    card.className = 'review-card';
                    card.setAttribute('data-review-id', review.id);

                    const ratings = getRatingsFromReview(review);
                    const avgRating = getAvgRatingFromReview(review);
                    const ratingClass = getRatingClass(avgRating ?? 0);
                    const stars = getStars(avgRating ?? 0);
                    const itemText = getReviewItem(review, category);
                    const commentHtml = review.comment
                        ? `<div class="card-comment">"${escapeHtml(review.comment)}"</div>`
                        : '';
                    const breakdownHtml = ratings
                        ? `<div class="rating-label">Nini: <strong>${escapeHtml(String(ratings.mine))}</strong> • Bibi: <strong>${escapeHtml(String(ratings.other))}</strong></div>`
                        : `<div class="rating-label">z 10 punktów</div>`;

                    card.innerHTML = `
                        <div class="card-header">
                            <h3>${escapeHtml(review.shop)}</h3>
                            <div class="card-actions">
                                <button class="edit-btn" aria-label="Edytuj" onclick="window._editReview('${review.id}')">✏️</button>
                                <button class="delete-btn" aria-label="Usuń" onclick="window._deleteReview('${review.id}')">🗑️</button>
                            </div>
                        </div>
                        <div class="card-meta">
                            <span class="card-date">${escapeHtml(review.date)}</span>
                            <span class="card-flavor">${itemIcon} ${escapeHtml(itemText)}</span>
                        </div>
                        ${commentHtml}
                        <div class="card-rating">
                            <div class="rating-badge ${ratingClass}">${escapeHtml(String(avgRating ?? '—'))}</div>
                            <div>
                                <div class="rating-stars">${stars}</div>
                                ${breakdownHtml}
                            </div>
                        </div>
                    `;
                    reviewsContainer.appendChild(card);
                });

                // Prompt to encourage more reviews (shown under existing cards).
                reviewsContainer.insertAdjacentHTML('beforeend', renderMoreReviewsPrompt(category));
            }

            function render() {
                const data = latestReviewsData;
                const reviewsArray = data
                    ? Object.entries(data)
                        .map(([key, val]) => ({ id: key, ...val }))
                        .sort((a, b) => getReviewTs(b) - getReviewTs(a))
                    : [];

                if (activeTab === 'ranking') {
                    renderRanking(reviewsArray);
                    return;
                }
                const category = getTabCategory(activeTab);
                sectionLabel.textContent = category === 'restaurant' ? 'Oceny restauracji' : 'Nasze oceny';
                renderReviews(reviewsArray, category);
            }

            reviewsRef.on('value', snapshot => {
                latestReviewsData = snapshot.val();
                render();
            });

            // ==================== SUBMIT REVIEW ====================
            form.addEventListener('submit', e => {
                e.preventDefault();

                const ratingMine = parseFloat(document.getElementById('rating-mine').value);
                const ratingOther = parseFloat(document.getElementById('rating-other').value);
                const ratingAvg = (ratingMine + ratingOther) / 2;

                const itemValue = itemInput.value.trim();
                const category = editingCategory; // 'icecream' | 'restaurant'

                const payload = {
                    shop: document.getElementById('shop-name').value.trim(),
                    ratingMine: Number(ratingMine.toFixed(1)),
                    ratingOther: Number(ratingOther.toFixed(1)),
                    ratingAvg: Number(ratingAvg.toFixed(1)),
                    comment: document.getElementById('comment').value.trim(),
                    date: new Date().toLocaleDateString('pl-PL'),
                    updatedAt: Date.now(),
                    category: category
                };

                if (category === 'restaurant') {
                    payload.food = itemValue;
                } else {
                    payload.flavor = itemValue;
                }
                const writePromise = editingReviewId
                    ? reviewsRef.child(editingReviewId).update(payload)
                    : reviewsRef.push({ ...payload, timestamp: Date.now() });

                writePromise
                    .then(async () => {
                        const wasEditing = Boolean(editingReviewId);
                        form.reset();
                        closeSheet();
                        if (!wasEditing && category === 'icecream') {
                            await playIcecreamCelebration();
                        }
                        if (!wasEditing && category === 'restaurant') {
                            await playRestaurantCelebration();
                        }
                        const addIcon = category === 'restaurant' ? '🍽️' : '🍦';
                        showToast(wasEditing ? 'Ocena zaktualizowana! ✏️' : `Ocena dodana! ${addIcon}`);
                    })
                    .catch(() => showToast('Błąd zapisu!', 'error'));
            });
        });
    </script>
</body>
</html>
