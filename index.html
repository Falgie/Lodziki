<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1a1a2e">
    <title>Lodowi Krytycy 🍦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pink: #ff6b9d;
            --pink-soft: #ff9ebb;
            --pink-glow: rgba(255, 107, 157, 0.25);
            --purple: #c44dff;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #22223a;
            --bg-input: #16162b;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a8;
            --text-muted: #55556a;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
            --radius-sm: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== APP SHELL ========== */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: linear-gradient(180deg, var(--bg-dark) 60%, transparent);
            z-index: 10;
        }

        .top-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px var(--pink-glow));
        }

        .top-bar h1 {
            font-size: 1.3em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .sync-badge.connected {
            background: rgba(76, 217, 100, 0.12);
            color: #4cd964;
        }

        .sync-badge.disconnected {
            background: rgba(255, 69, 58, 0.12);
            color: #ff453a;
        }

        .sync-badge.connecting {
            background: rgba(255, 204, 0, 0.12);
            color: #ffcc00;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .sync-badge.connected .sync-dot {
            animation: none;
            opacity: 1;
        }

        /* ========== SCROLLABLE REVIEWS LIST ========== */
        .reviews-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 16px 100px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .reviews-scroll::-webkit-scrollbar {
            display: none;
        }

        .section-label {
            font-size: 0.75em;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .emoji {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.6;
        }

        /* ========== REVIEW CARDS ========== */
        .review-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid var(--border);
            transition: transform 0.25s ease, opacity 0.25s ease, background 0.2s ease;
            overflow: hidden;
        }

        .review-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--pink), var(--purple));
            border-radius: 4px 0 0 4px;
        }

        .review-card:active {
            transform: scale(0.98);
            background: var(--bg-card-hover);
        }

        .review-card.removing {
            opacity: 0;
            transform: translateX(-100%);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-header h3 {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text-primary);
            padding-right: 10px;
            line-height: 1.3;
        }

        .delete-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 69, 58, 0.1);
            color: #ff453a;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .delete-btn:active {
            background: rgba(255, 69, 58, 0.25);
            transform: scale(0.9);
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .edit-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(76, 217, 100, 0.1);
            color: #4cd964;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .edit-btn:active {
            background: rgba(76, 217, 100, 0.25);
            transform: scale(0.9);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-date {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-flavor {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 107, 157, 0.08);
            color: var(--pink-soft);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.78em;
            font-weight: 600;
        }

        .card-comment {
            color: var(--text-secondary);
            font-size: 0.88em;
            line-height: 1.5;
            margin-top: 8px;
            font-style: italic;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 800;
            color: white;
        }

        .rating-badge.high {
            background: linear-gradient(135deg, #4cd964, #34c759);
            box-shadow: 0 4px 12px rgba(76, 217, 100, 0.3);
        }

        .rating-badge.medium {
            background: linear-gradient(135deg, #ffcc00, #ff9500);
            box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);
        }

        .rating-badge.low {
            background: linear-gradient(135deg, #ff6b6b, #ff453a);
            box-shadow: 0 4px 12px rgba(255, 69, 58, 0.3);
        }

        .rating-label {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .rating-stars {
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        /* ========== FAB (Floating Action Button) ========== */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 50%;
            transform: translateX(50%);
            max-width: 480px;
            width: calc(100% - 32px);
            z-index: 50;
            display: flex;
            justify-content: flex-end;
            pointer-events: none;
        }

        .fab-btn {
            pointer-events: auto;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.35);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            padding: 0;
            margin: 0;
        }

        .fab-btn:active {
            transform: scale(0.9);
        }

        .fab-btn.active {
            transform: rotate(45deg);
            border-radius: 50%;
        }

        /* ========== BOTTOM SHEET ========== */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sheet-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.open {
            transform: translate(-50%, 0);
        }

        .sheet-handle-area {
            padding: 12px 0 4px;
            display: flex;
            justify-content: center;
            cursor: grab;
            flex-shrink: 0;
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
        }

        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px 16px;
            flex-shrink: 0;
        }

        .sheet-header h2 {
            font-size: 1.15em;
            font-weight: 700;
        }

        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            padding: 0;
            margin: 0;
        }

        .sheet-close:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .sheet-body {
            padding: 0 20px 20px;
            overflow-y: auto;
            flex: 1;
        }

        /* ========== FORM ========== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.78em;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 0 3px var(--pink-glow);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group textarea {
            resize: none;
            min-height: 80px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white;
            font-size: 1.05em;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ========== CONFIRM DIALOG ========== */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }

        .confirm-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .confirm-dialog {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border);
        }

        .confirm-overlay.visible .confirm-dialog {
            transform: scale(1);
        }

        .confirm-dialog .emoji-big {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .confirm-dialog p {
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-actions button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 0.95em;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .btn-cancel:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-delete {
            background: #ff453a;
            color: white;
        }

        .btn-delete:active {
            opacity: 0.8;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            max-width: 380px;
            width: calc(100% - 40px);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.9em;
            font-weight: 600;
            z-index: 300;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(76, 217, 100, 0.15);
            color: #4cd964;
            border: 1px solid rgba(76, 217, 100, 0.2);
            backdrop-filter: blur(12px);
        }

        .toast.error {
            background: rgba(255, 69, 58, 0.15);
            color: #ff453a;
            border: 1px solid rgba(255, 69, 58, 0.2);
            backdrop-filter: blur(12px);
        }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 481px) {
            .app {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">
                <span class="logo-icon">🍦</span>
                <h1>Lodowi Krytycy</h1>
            </div>
            <div id="sync-badge" class="sync-badge connecting">
                <span class="sync-dot"></span>
                <span id="sync-text">Łączenie...</span>
            </div>
        </div>

        <!-- Scrollable Reviews -->
        <div class="reviews-scroll">
            <div class="section-label">Nasze oceny</div>
            <div id="reviews-container"></div>
        </div>
    </div>

    <!-- FAB -->
    <div class="fab">
        <button class="fab-btn" id="fab-btn" aria-label="Dodaj ocenę">+</button>
    </div>

    <!-- Bottom Sheet Overlay -->
    <div class="sheet-overlay" id="sheet-overlay"></div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-handle-area"><div class="sheet-handle"></div></div>
        <div class="sheet-header">
            <h2 id="sheet-title">Nowa ocena 🍧</h2>
            <button class="sheet-close" id="sheet-close" aria-label="Zamknij">✕</button>
        </div>
        <div class="sheet-body">
            <form id="review-form">
                <div class="form-group">
                    <label for="shop-name">Lodziarnia / Miejsce</label>
                    <input type="text" id="shop-name" required placeholder="np. Lody u Jana">
                </div>
                <div class="form-group">
                    <label for="flavor">Smak</label>
                    <input type="text" id="flavor" required placeholder="np. Słony karmel i mango">
                </div>
                <div class="form-group">
                    <label for="rating-mine">Ocena Nini (0–10)</label>
                    <input type="number" id="rating-mine" min="0" max="10" step="0.5" required placeholder="8.5">
                </div>
                <div class="form-group">
                    <label for="rating-other">Ocena Bibi (0–10)</label>
                    <input type="number" id="rating-other" min="0" max="10" step="0.5" required placeholder="7.0">
                </div>
                <div class="form-group">
                    <label for="comment">Komentarz (opcjonalnie)</label>
                    <textarea id="comment" rows="3" placeholder="Co nam się podobało?"></textarea>
                </div>
                <button type="submit" class="submit-btn">Zapisz ocenę! 🍧</button>
            </form>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-dialog">
            <span class="emoji-big">🗑️</span>
            <p>Na pewno usunąć tę ocenę?<br>Zniknie u obu osób.</p>
            <div class="confirm-actions">
                <button class="btn-cancel" id="confirm-cancel">Anuluj</button>
                <button class="btn-delete" id="confirm-delete">Usuń</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCUdQqKQ-wOeI-iVDZ4lzA5eVVJ8X98ZXQ",
            authDomain: "lodowka-9ca68.firebaseapp.com",
            databaseURL: "https://lodowka-9ca68-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lodowka-9ca68",
            storageBucket: "lodowka-9ca68.firebasestorage.app",
            messagingSenderId: "453003799938",
            appId: "1:453003799938:web:b5f64cccf6e36dae51b39b",
            measurementId: "G-XCB7SDNDDT"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const reviewsRef = db.ref('reviews');

        // ==================== DOM ====================
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('review-form');
            const reviewsContainer = document.getElementById('reviews-container');
            const syncBadge = document.getElementById('sync-badge');
            const syncText = document.getElementById('sync-text');
            const fabBtn = document.getElementById('fab-btn');
            const sheetOverlay = document.getElementById('sheet-overlay');
            const bottomSheet = document.getElementById('bottom-sheet');
            const sheetClose = document.getElementById('sheet-close');
            const sheetTitle = document.getElementById('sheet-title');
            const confirmOverlay = document.getElementById('confirm-overlay');
            const confirmCancel = document.getElementById('confirm-cancel');
            const confirmDelete = document.getElementById('confirm-delete');
            const toastEl = document.getElementById('toast');

            let pendingDeleteId = null;
            let editingReviewId = null;

            // ==================== CONNECTION STATUS ====================
            db.ref('.info/connected').on('value', snap => {
                if (snap.val() === true) {
                    syncBadge.className = 'sync-badge connected';
                    syncText.textContent = 'Połączono';
                } else {
                    syncBadge.className = 'sync-badge disconnected';
                    syncText.textContent = 'Offline';
                }
            });

            // ==================== TOAST ====================
            function showToast(message, type = 'success') {
                toastEl.textContent = message;
                toastEl.className = `toast ${type}`;
                requestAnimationFrame(() => toastEl.classList.add('show'));
                setTimeout(() => toastEl.classList.remove('show'), 2500);
            }

            // ==================== BOTTOM SHEET ====================
            function openSheet() {
                sheetOverlay.classList.add('visible');
                bottomSheet.classList.add('open');
                fabBtn.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeSheet() {
                sheetOverlay.classList.remove('visible');
                bottomSheet.classList.remove('open');
                fabBtn.classList.remove('active');
                document.body.style.overflow = '';
                editingReviewId = null;
                sheetTitle.textContent = 'Nowa ocena 🍧';
            }

            fabBtn.addEventListener('click', () => {
                if (bottomSheet.classList.contains('open')) {
                    closeSheet();
                } else {
                    editingReviewId = null;
                    sheetTitle.textContent = 'Nowa ocena 🍧';
                    openSheet();
                }
            });

            sheetOverlay.addEventListener('click', closeSheet);
            sheetClose.addEventListener('click', closeSheet);

            // ==================== CONFIRM DIALOG ====================
            function showConfirm(reviewId) {
                pendingDeleteId = reviewId;
                confirmOverlay.classList.add('visible');
            }

            function hideConfirm() {
                confirmOverlay.classList.remove('visible');
                pendingDeleteId = null;
            }

            confirmCancel.addEventListener('click', hideConfirm);
            confirmOverlay.addEventListener('click', (e) => {
                if (e.target === confirmOverlay) hideConfirm();
            });

            confirmDelete.addEventListener('click', () => {
                if (!pendingDeleteId) return;
                const reviewId = pendingDeleteId; // keep value before hideConfirm() nulls it
                const card = document.querySelector(`[data-review-id="${pendingDeleteId}"]`);
                if (card) card.classList.add('removing');
                hideConfirm();
                setTimeout(() => {
                    reviewsRef.child(reviewId).remove()
                        .then(() => showToast('Ocena usunięta 🗑️'))
                        .catch(() => showToast('Błąd usuwania!', 'error'));
                }, 250);
            });

            window._deleteReview = showConfirm;

            window._editReview = (reviewId) => {
                reviewsRef.child(reviewId).once('value')
                    .then(snap => {
                        const review = snap.val();
                        if (!review) return;

                        editingReviewId = reviewId;
                        sheetTitle.textContent = 'Edytuj ocenę ✏️';

                        document.getElementById('shop-name').value = review.shop || '';
                        document.getElementById('flavor').value = review.flavor || '';

                        const ratings = getRatingsFromReview(review);
                        if (ratings) {
                            document.getElementById('rating-mine').value = String(ratings.mine);
                            document.getElementById('rating-other').value = String(ratings.other);
                        } else {
                            const fallback = toOneDecimal(review.rating) ?? 0;
                            document.getElementById('rating-mine').value = String(fallback);
                            document.getElementById('rating-other').value = String(fallback);
                        }

                        document.getElementById('comment').value = review.comment || '';

                        openSheet();
                    })
                    .catch(() => showToast('Nie udało się wczytać oceny', 'error'));
            };

            // ==================== HELPERS ====================
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getRatingClass(rating) {
                const num = parseFloat(rating);
                if (num >= 7) return 'high';
                if (num >= 4) return 'medium';
                return 'low';
            }

            function getStars(rating) {
                const num = parseFloat(rating);
                const full = Math.floor(num / 2);
                const half = (num % 2) >= 1 ? 1 : 0;
                return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
            }

            function toOneDecimal(num) {
                const n = Number(num);
                if (!Number.isFinite(n)) return null;
                return Number(n.toFixed(1));
            }

            function getRatingsFromReview(review) {
                // Backward compatibility with older entries that have only `rating`
                const mine = toOneDecimal(review.ratingMine ?? review.rating_mine ?? review.rating);
                const other = toOneDecimal(review.ratingOther ?? review.rating_other ?? review.rating);
                if (mine === null || other === null) return null;
                const avg = toOneDecimal((mine + other) / 2);
                return { mine, other, avg };
            }

            function getAvgRatingFromReview(review) {
                const explicitAvg = toOneDecimal(review.ratingAvg ?? review.rating_avg);
                if (explicitAvg !== null) return explicitAvg;
                const ratings = getRatingsFromReview(review);
                if (ratings) return ratings.avg;
                return toOneDecimal(review.rating);
            }

            // ==================== RENDER REVIEWS ====================
            reviewsRef.on('value', snapshot => {
                reviewsContainer.innerHTML = '';
                const data = snapshot.val();

                if (!data) {
                    reviewsContainer.innerHTML = `
                        <div class="empty-state">
                            <span class="emoji">🍨</span>
                            <p>Jeszcze nie oceniliście żadnych lodów.<br>Kliknij <strong>+</strong> i dodajcie pierwszą ocenę!</p>
                        </div>
                    `;
                    return;
                }

                const reviewsArray = Object.entries(data)
                    .map(([key, val]) => ({ id: key, ...val }))
                    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                reviewsArray.forEach(review => {
                    const card = document.createElement('div');
                    card.className = 'review-card';
                    card.setAttribute('data-review-id', review.id);

                    const ratings = getRatingsFromReview(review);
                    const avgRating = getAvgRatingFromReview(review);
                    const ratingClass = getRatingClass(avgRating ?? 0);
                    const stars = getStars(avgRating ?? 0);
                    const commentHtml = review.comment
                        ? `<div class="card-comment">"${escapeHtml(review.comment)}"</div>`
                        : '';
                    const breakdownHtml = ratings
                        ? `<div class="rating-label">Twoja: <strong>${escapeHtml(String(ratings.mine))}</strong> • Inna: <strong>${escapeHtml(String(ratings.other))}</strong></div>`
                        : `<div class="rating-label">z 10 punktów</div>`;

                    card.innerHTML = `
                        <div class="card-header">
                            <h3>${escapeHtml(review.shop)}</h3>
                            <div class="card-actions">
                                <button class="edit-btn" aria-label="Edytuj" onclick="window._editReview('${review.id}')">✏️</button>
                                <button class="delete-btn" aria-label="Usuń" onclick="window._deleteReview('${review.id}')">🗑️</button>
                            </div>
                        </div>
                        <div class="card-meta">
                            <span class="card-date">${escapeHtml(review.date)}</span>
                            <span class="card-flavor">🍦 ${escapeHtml(review.flavor)}</span>
                        </div>
                        ${commentHtml}
                        <div class="card-rating">
                            <div class="rating-badge ${ratingClass}">${escapeHtml(String(avgRating ?? '—'))}</div>
                            <div>
                                <div class="rating-stars">${stars}</div>
                                ${breakdownHtml}
                            </div>
                        </div>
                    `;
                    reviewsContainer.appendChild(card);
                });
            });

            // ==================== SUBMIT REVIEW ====================
            form.addEventListener('submit', e => {
                e.preventDefault();

                const ratingMine = parseFloat(document.getElementById('rating-mine').value);
                const ratingOther = parseFloat(document.getElementById('rating-other').value);
                const ratingAvg = (ratingMine + ratingOther) / 2;

                const payload = {
                    shop: document.getElementById('shop-name').value.trim(),
                    flavor: document.getElementById('flavor').value.trim(),
                    ratingMine: Number(ratingMine.toFixed(1)),
                    ratingOther: Number(ratingOther.toFixed(1)),
                    ratingAvg: Number(ratingAvg.toFixed(1)),
                    comment: document.getElementById('comment').value.trim(),
                    date: new Date().toLocaleDateString('pl-PL'),
                    updatedAt: Date.now()
                };

                const writePromise = editingReviewId
                    ? reviewsRef.child(editingReviewId).update(payload)
                    : reviewsRef.push({ ...payload, timestamp: Date.now() });

                writePromise
                    .then(() => {
                        const wasEditing = Boolean(editingReviewId);
                        form.reset();
                        closeSheet();
                        showToast(wasEditing ? 'Ocena zaktualizowana! ✏️' : 'Ocena dodana! 🍦');
                    })
                    .catch(() => showToast('Błąd zapisu!', 'error'));
            });
        });
    </script>
</body>
</html>
